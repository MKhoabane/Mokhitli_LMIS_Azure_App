services:
  app:
    image: ${APP_IMAGE:-qcto-lmis-app:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      APP_ENV: ${APP_ENV:-production}
      APP_BASE_URL: ${APP_BASE_URL:-https://lmis.example.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://lmis.example.com}
      RELEASE_VERSION: ${RELEASE_VERSION:-manual}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      RUN_DB_SETUP: ${RUN_DB_SETUP:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_SSL: ${DB_SSL:-false}
      PGUSER: ${PGUSER:-postgres}
      PGHOST: db
      PGDATABASE: ${PGDATABASE:-qcto_lmis}
      PGPASSWORD: ${PGPASSWORD:-password}
      PGPORT: 5432
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "5000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-password}
      POSTGRES_DB: ${PGDATABASE:-qcto_lmis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-qcto_lmis}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
