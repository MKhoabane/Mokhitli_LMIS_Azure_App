name: Tagged Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate release notes and changelog entry
        run: node infrastructure/ci-cd/generate-release-notes.mjs "${{ github.ref_name }}" release-notes.md

      - name: Create changelog pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: docs: update changelog for ${{ github.ref_name }}
          branch: automation/changelog-${{ github.ref_name }}
          delete-branch: true
          title: docs: update changelog for ${{ github.ref_name }}
          body: |
            Automated changelog update generated from tag `${{ github.ref_name }}`.

            - updates `CHANGELOG.md`
            - keeps release-note publication decoupled from protected branch direct pushes

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
