name: Staging Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Staging target to run
        required: true
        default: all
        type: choice
        options:
          - all
          - azure
          - vps
          - none

concurrency:
  group: staging-release
  cancel-in-progress: false

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test -- --runInBand

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run test -- --run
      - run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.image.outputs.image_name }}
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_tag: ${{ steps.image.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/qcto-lmis-azure-app"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.production
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.image_name }}:latest

  deploy-staging-azure:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    if: >
      needs.build-and-push.result == 'success' &&
      (
        (github.event_name == 'push' && vars.DEPLOY_STAGING_TO_AZURE == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'azure' || inputs.deploy_target == 'all'))
      )
    steps:
      - name: Validate staging Azure deployment inputs
        env:
          WEBAPP_NAME: ${{ secrets.STAGING_AZURE_WEBAPP_NAME }}
          RESOURCE_GROUP: ${{ secrets.STAGING_AZURE_RESOURCE_GROUP }}
          BASE_URL: ${{ secrets.STAGING_AZURE_BASE_URL }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          if [ -z "$WEBAPP_NAME" ]; then
            echo "STAGING_AZURE_WEBAPP_NAME is required."
            exit 1
          fi

          if [ -z "$RESOURCE_GROUP" ]; then
            echo "STAGING_AZURE_RESOURCE_GROUP is required."
            exit 1
          fi

          if [ -z "$BASE_URL" ]; then
            echo "STAGING_AZURE_BASE_URL is required."
            exit 1
          fi

          if [ -z "$GHCR_USERNAME" ] || [ -z "$GHCR_READ_TOKEN" ]; then
            echo "GHCR_USERNAME and GHCR_READ_TOKEN are required for Azure container pulls."
            exit 1
          fi

          case "$WEBAPP_NAME" in
            -*|*-) echo "STAGING_AZURE_WEBAPP_NAME cannot start or end with a hyphen: $WEBAPP_NAME"; exit 1 ;;
            *[!A-Za-z0-9-]*) echo "STAGING_AZURE_WEBAPP_NAME must use only letters, numbers, and hyphens: $WEBAPP_NAME"; exit 1 ;;
          esac

          if [ "${#WEBAPP_NAME}" -lt 2 ] || [ "${#WEBAPP_NAME}" -gt 60 ]; then
            echo "STAGING_AZURE_WEBAPP_NAME must be between 2 and 60 characters: $WEBAPP_NAME"
            exit 1
          fi

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Point staging App Service at the new container image
        run: |
          az webapp config container set \
            --name "${{ secrets.STAGING_AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.STAGING_AZURE_RESOURCE_GROUP }}" \
            --container-image-name "${{ needs.build-and-push.outputs.image_ref }}" \
            --container-registry-url "https://ghcr.io" \
            --container-registry-user "${{ secrets.GHCR_USERNAME }}" \
            --container-registry-password "${{ secrets.GHCR_READ_TOKEN }}"

      - name: Configure staging App Service runtime settings
        env:
          BASE_URL: ${{ secrets.STAGING_AZURE_BASE_URL }}
          OPTIONAL_APP_SETTINGS: ${{ secrets.STAGING_AZURE_APP_SETTINGS }}
        run: |
          set -eu

          SETTINGS=(
            "WEBSITES_PORT=5000"
            "PORT=5000"
            "NODE_ENV=production"
            "APP_ENV=staging"
            "APP_BASE_URL=$BASE_URL"
            "CORS_ORIGIN=$BASE_URL"
            "TRUST_PROXY=true"
            "RELEASE_VERSION=${{ needs.build-and-push.outputs.image_tag }}"
          )

          if [ -n "$OPTIONAL_APP_SETTINGS" ]; then
            while IFS= read -r setting; do
              setting="${setting#"${setting%%[![:space:]]*}"}"
              setting="${setting%"${setting##*[![:space:]]}"}"
              if [ -n "$setting" ]; then
                SETTINGS+=("$setting")
              fi
            done < <(printf '%s\n' "$OPTIONAL_APP_SETTINGS" | tr ' ' '\n')
          fi

          az webapp config appsettings set \
            --name "${{ secrets.STAGING_AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.STAGING_AZURE_RESOURCE_GROUP }}" \
            --settings "${SETTINGS[@]}"

      - name: Configure staging App Service health check
        run: |
          az webapp config set \
            --name "${{ secrets.STAGING_AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.STAGING_AZURE_RESOURCE_GROUP }}" \
            --generic-configurations '{"healthCheckPath":"/api/health"}'

      - name: Restart staging App Service
        run: |
          az webapp restart \
            --name "${{ secrets.STAGING_AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.STAGING_AZURE_RESOURCE_GROUP }}"

  smoke-test-staging-azure:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy-staging-azure
    if: ${{ needs.deploy-staging-azure.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node infrastructure/ci-cd/smoke-test.mjs "${{ secrets.STAGING_AZURE_BASE_URL }}" "staging" "${{ needs.build-and-push.outputs.image_tag }}"

  deploy-staging-vps:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    if: >
      needs.build-and-push.result == 'success' &&
      (
        (github.event_name == 'push' && vars.DEPLOY_STAGING_TO_VPS == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'vps' || inputs.deploy_target == 'all'))
      )
    steps:
      - name: Deploy staging on VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USERNAME }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          port: ${{ secrets.STAGING_VPS_PORT }}
          script: |
            set -eu
            cd "${{ secrets.STAGING_VPS_APP_DIR }}"
            git fetch --all
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            export APP_IMAGE="${{ needs.build-and-push.outputs.image_ref }}"
            export APP_ENV="staging"
            export RELEASE_VERSION="${{ needs.build-and-push.outputs.image_tag }}"
            sh infrastructure/vps/deploy.sh

  smoke-test-staging-vps:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy-staging-vps
    if: ${{ needs.deploy-staging-vps.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node infrastructure/ci-cd/smoke-test.mjs "${{ secrets.STAGING_VPS_BASE_URL }}" "staging" "${{ needs.build-and-push.outputs.image_tag }}"
